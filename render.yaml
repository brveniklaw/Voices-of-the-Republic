services:
  - type: web
    name: voices-of-the-republic
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voices-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: BASE_URL
        sync: false
      - key: TRIAL_DAYS
        value: "7"
      - key: PAID_DATE
        value: "2026-07-04"
      - key: NODE_ENV
        value: production

databases:
  - name: voices-db
    plan: free
    databaseName: voicesrepublic
    user: voicesadmin
